name: Fetch Latest News
on:
  schedule:
    - cron: '30 2 * * *' # 02:30 UTC = 08:00 AM IST
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/fetch-rss.mjs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated news update"
          title: "chore: daily news update"
          body: "Automated daily news fetch from RSS feeds."
          branch: auto/news-update
          delete-branch: true
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
