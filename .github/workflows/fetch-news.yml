name: Fetch Latest News
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/fetch-rss.mjs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update news articles"
          title: "chore: daily news update"
          body: |
            Automated daily news fetch from RSS feeds.
            
            - The Hacker News
            - Cyber Security News
            - CyberPress
          branch: auto/news-update
          delete-branch: true