name: Fetch Latest News

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily (11:30 AM IST)
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest RSS articles
        run: node scripts/fetch-rss.mjs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Commit and push new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain content/)" ]; then
            git add content/
            git commit -m "chore: automated news update $(date -u +'%Y-%m-%d')"
            git push origin HEAD:main
          else
            echo "No new articles found — nothing to commit."
          fi
